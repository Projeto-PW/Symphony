<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony | Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/logo.svg">
</head>
<body>
    <header>
        <img src="../assets/logo.svg" alt="Logo">
        <h1>SYMPHONY</h1>
    </header>
    <main>
        <h2>Faça o seu login</h2>
        <section class="login-data">
            <div><img src="../assets/perfil.svg"><input id="email" type="email" placeholder="Email"></div>
            <div><img src="../assets/senha.svg"><input id="senha" type="password" placeholder="Senha"></div>
        </section>
        <section class="lembrar-data">
            <div>
                <input id="lembrar" type="checkbox">
                <span>Lembre-se de mim</span>
            </div>
            <a href="#">Esqueci a senha</a>
        </section>
        <section class="fazer-login">
            <button id="btnEntrar">ENTRAR</button>
        </section>
    </main>
    <footer>
        <img src="../assets/whiteLogo.svg" alt="Logo">
        <h6>SYMPHONY</h6>
    </footer>
</body>
</html>

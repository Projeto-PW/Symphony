<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony | Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" href="../assets/logo.svg">
</head>
<body>
    <header>
        <img class="logo" src="../assets/logo.svg" alt="Logo">
        <img class="title" src="../assets/title.svg" alt="SYMPHONY">
    </header>
    <main>
        <h2>Faça o seu login</h2>
        <section class="login-data">
            <div>
                <img src="../assets/perfil.svg">
                <input id="email" type="email" placeholder="Email">
                <button class="btn-cancelar" onclick="limparTexto(this)"><span></span><span></span></button>
            </div>
            <span class="invalid" id="invalidEmail">Email inválido!</span>
            <div>
                <img src="../assets/senha.svg">
                <input id="senha" type="password" placeholder="Senha">
                <button class="btn-cancelar" onclick="limparTexto(this)"><span></span><span></span></button>
            </div>
            <span class="invalid" id="invalidPassword">Senha inválida!</span>
        </section>
        <section class="lembrar-data">
            <div>
                <input id="lembrar" type="checkbox">
                <span>Lembre-se de mim</span>
            </div>
            <a href="#">Esqueci a senha</a>
        </section>
        <section class="fazer-login">
            <button id="btnEntrar" onclick="login()">ENTRAR</button>
        </section>
    </main>
    <footer>
        <img src="../assets/whiteLogo.svg" alt="Logo">
        <h6>&copy; SYMPHONY</h6>
    </footer>

    <script src="../js/login.js"></script>
</body>
</html>

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki | Symphony</title>
    <link rel="icon" href="../assets/logo.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/wiki.css" />
  </head>
  <body>
    <header>
      <section>
        <a href="../../index.html" class="logo">
          <img src="../assets/logo.svg" alt="Logo" />
        </a>
        <div class="barra-pesquisa">
          <input type="text" placeholder="PESQUISAR" />
          <img
            src="../assets/search.svg"
            alt="Barra de Pesquisa"
            class="img-pesquisa"
          />
        </div>
        <a href="./login.html" class="link-perfil"
          ><img src="../assets/perfil.svg" alt="Foto de Perfil"
        /></a>
      </section>
      <nav>
        <ul>
          <li><a href="../../index.html">HOME</a></li>
          <li><a href="./creditos.html">CRÉDITOS</a></li>
          <li><a href="./login.html">PERFIL</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <img class="wiki-img" src="../assets/sonicWikiIcon.webp" alt="WIKI" />
      <section class="list-section">
        <ul id="characterList">
          <li class="character">
            <a href="./sonic.html">
              <img
                src="../assets/sonicWikiLink.webp"
                alt="Sonic: The Hedgehog"
              />
            </a>
          </li>
          <li class="character">
            <a href="./shadow.html">
              <img
                src="../assets/shadowWikiLink.webp"
                alt="Shadow: The Hedgehog"
              />
            </a>
          </li>
          <li class="character">
            <a href="./tails.html">
              <img
                src="../assets/tailsWikiLink.webp"
                alt="Tails Miles Prower"
              />
            </a>
          </li>
          <li class="character">
            <a href="./knuckles.html">
              <img
                src="../assets/knucklesWikiLink.webp"
                alt="Knuckles: The Echidna"
              />
            </a>
          </li>
          <li class="character">
            <a href="./silver.html">
              <img
                src="../assets/silverWikiLink.webp"
                alt="Silver: The Hedgehog"
              />
            </a>
          </li>
        </ul>
        <div class="control-wiki-buttons">
          <button id="btnBack" onclick="moveList(-1)">
            <img src="../assets/btnBackNext.svg" alt="<-" />
          </button>
          <button id="btnNext" onclick="moveList(1)">
            <img src="../assets/btnBackNext.svg" alt="->" />
          </button>
        </div>
        <img
          class="logo-game"
          src="../assets/logoSonic.webp"
          alt="Sonic: The Hedgehog"
        />
      </section>
    </main>
    <section class="musica">
      <div class="musica-info">
        <div id="albumImg"></div>
        <div class="info-text">
          <h2></h2>
          <h3></h3>
        </div>
      </div>
      <article>
        <div class="control-music">
          <section class="control-buttons">
            <button id="btnMusicaAnterior" onclick="selSong(-1)">
              <img src="../assets/back.svg" />
            </button>
            <button id="btnPlay" onclick="playSong()">
              <img src="../assets/play.svg" />
            </button>
            <button id="btnProximaMusica" onclick="selSong(1)">
              <img src="../assets/next.svg" />
            </button>
          </section>
          <section class="time-music">
            <h5 id="tempoAtual"></h5>
            <div>
              <span class="time-ball"></span>
              <div class="timeline">
                <span class="current-time"></span>
              </div>
            </div>
            <h5 id="tempoTotal"></h5>
          </section>
        </div>
        <div class="music-extra-controls">
          <button id="btnReplay" onclick="toggleReplay()">
            <img src="../assets/replay.svg" />
          </button>
          <input type="range" id="volume" min="0" max="100" value="50">
        </div>
      </article>
    </section>
    <footer>
      <h6>&copy; 2025-2026 Symphony. Todos os direitos reservados</h6>
    </footer>
    <script src="../js/music.js"></script>
    <script src="../js/characterList.js"></script>
  </body>
</html>

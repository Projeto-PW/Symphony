<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony</title>
    <link rel="icon" href="./src/assets/logo.svg">
    <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>
    <header>
        <section>
            <a href="index.html" class="logo">
                <img src="./src/assets/logo.svg" alt="Logo">
            </a>
            <div class="barra-pesquisa">
                <input type="text" placeholder="PESQUISAR">
                <img src="./src/assets/search.svg" alt="Barra de Pesquisa" class="img-pesquisa">
            </div>
            <a href="#" class="link-perfil"><img src="./src/assets/perfil.svg" alt="Foto de Perfil"></a>
        </section>
        <nav>
            <ul>
                <li><a href="">MÚSICAS</a></li>
                <li><a href="">HOME</a></li>
                <li><a href="">CRÉDITOS</a></li>
                <li><a href="">PERFIL</a></li>
                <li><a href="">CONFIG.</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="slideshow">
            <div class="slideshow-images"></div>
            <div class="slideshow-bar">
                <div class="slideshow-counter"></div>
                <div class="slideshow-progress">
                    <span></span>
                </div>
            </div>    
        </section>
    
        <section>
            <div id="carrossel">
                <button id="btn-proximo"><img src="#" alt="btn-proximo"></button>
                <div id="carrossel-lista">
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                    <div class="carrossel-item"></div>
                </div>
                <button id="btn-anterior"><img src="#" alt="btn-anterior"></button>
            </div>
        </section>
    </main>
    <section class="musica">
        <div id="albumImg"></div>
        <article>
            <div class="control-music">
                <div class="control-buttons">
                    <button id="btnMusicaAnterior">
                        <img src="./src/assets/back.svg">
                    </button>
                    <button id="btnPlay">
                        <img src="./src/assets/play.svg">
                    </button>
                    <button id="btnProximaMusica">
                        <img src="./src/assets/next.svg"> 
                    </button>
                </div>
                <div class="time-music">
                    <span class="time-ball"></span>
                    <div class="timeline">
                        <span class="current-time"></span>
                    </div>
                </div>
            </div>
            <button id="btnReplay"><img src="./src/assets/replay.svg"></button>
        </article>
    </section>
    <script src="./src/js/script.js"></script>
</body>
</html>

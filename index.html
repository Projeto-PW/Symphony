<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symphony</title>
    <link rel="icon" href="./src/assets/logo.svg" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="stylesheet" href="./src/css/index.css" />
  </head>
  <body>
    <header>
      <section>
        <a href="index.html" class="logo">
          <img src="./src/assets/logo.svg" alt="Logo" />
        </a>
        <div class="barra-pesquisa">
          <input type="text" placeholder="PESQUISAR" />
          <img
            src="./src/assets/search.svg"
            alt="Barra de Pesquisa"
            class="img-pesquisa"
          />
        </div>
        <a href="./src/pages/login.html" class="link-perfil"
          ><img src="./src/assets/perfil.svg" alt="Foto de Perfil"
        /></a>
      </section>
      <nav>
        <ul>
          <li><a href="./src/pages/musicas.html">MÚSICAS</a></li>
          <li><a href="./index.html">HOME</a></li>
          <li><a href="./src/pages/creditos.html">CRÉDITOS</a></li>
          <li><a href="">PERFIL</a></li>
          <li><a href="">CONFIG.</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="slideshow">
        <div class="slideshow-images"></div>
        <div class="slideshow-bar">
          <div class="slideshow-counter"></div>
          <div class="slideshow-progress">
            <span></span>
          </div>
        </div>
      </section>

      <section>
        <div class="carrossel">
          <button id="btnBack" onclick="carrosselScroll(-1)">
            <img src="./src/assets/btnBackNext2.svg" alt="<-" />
          </button>
          <div class="carrossel-list">
            <div id="item1" class="carrossel-item on">
              <img
                src="./src/assets/sonicCarrossel.svg"
                alt="Sonic: The Hedgehog"
                class="carrossel-image"
              />
            </div>
            <div id="item2" class="carrossel-item on">
              <img
                src="./src/assets/metalgearCarrossel.svg"
                alt="Metalgear"
                class="carrossel-image"
              />
            </div>
            <div id="item3" class="carrossel-item on">
              <img
                src="./src/assets/dmcCarrossel.svg"
                alt="Devil May Cry"
                class="carrossel-image"
              />
            </div>
            <div class="carrossel-item">
              <img
                src="./src/assets/ghostCarrossel.svg"
                alt="Ghost"
                class="carrossel-image"
              />
            </div>
            <div class="carrossel-item">
              <img
                src="./src/assets/ultrakillCarrossel.svg"
                alt="Ultrakill"
                class="carrossel-image"
              />
            </div>
            <div class="carrossel-item">
              <img
                src="./src/assets/personaCarrossel.svg"
                alt="Persona"
                class="carrossel-image"
              />
            </div>
          </div>
          <button id="btnNext" onclick="carrosselScroll(1)">
            <img src="./src/assets/btnBackNext2.svg" alt="->" />
          </button>
        </div>
      </section>

      <section class="selected-game">
        <img id="logoGame" />
        <article>
          <div class="game-links">
            <a href="#" id="musicLink" class="game-link"><img alt="Músicas"></a>
            <a href="#" id="wikiLink" class="game-link"><img alt="Wiki"></a>
          </div>
          <div class="game-content">
            <p id="descGame"></p>
          </div>
        </article>
      </section>
    </main>
    <section class="musica">
      <div class="musica-info">
        <div id="albumImg"></div>
        <div class="info-text">
          <h2></h2>
          <h3></h3>
        </div>
      </div>
      <article>
        <div class="control-music">
          <section class="control-buttons">
            <button id="btnMusicaAnterior" onclick="selSong(-1)">
              <img src="./src/assets/back.svg" />
            </button>
            <button id="btnPlay" onclick="playSong()">
              <img src="./src/assets/play.svg" />
            </button>
            <button id="btnProximaMusica" onclick="selSong(1)">
              <img src="./src/assets/next.svg" />
            </button>
          </section>
          <section class="time-music">
            <h5 id="tempoAtual"></h5>
            <div>
              <span class="time-ball"></span>
              <div class="timeline">
                <span class="current-time"></span>
              </div>
            </div>
            <h5 id="tempoTotal"></h5>
          </section>
        </div>
        <div class="music-extra-controls">
          <button id="btnReplay" onclick="toggleReplay()">
            <img src="./src/assets/replay.svg" />
          </button>
          <input type="range" id="volume" min="0" max="100" value="50">
        </div>
      </article>
    </section>
    <footer>
      <h6>&copy; 2025-2026 Symphony. Todos os direitos reservados</h6>
    </footer>
    <script src="./src/js/slideshow.js"></script>
    <script src="./src/js/carrossel.js"></script>
    <script src="./src/js/music.js"></script>
  </body>
</html>
